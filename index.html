<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stock Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>AI Stock Analyzer</h1>
        <p class="subtitle">Real-time technical analysis powered by AI</p>

        <div class="input-section">
            <div class="notice">Currently available for THYAO (Turkish Airlines) with live data. More stocks coming soon.</div>

            <div class="api-key-box">
                <label>Groq API Key <span class="key-status" id="groqStatus">Not set</span></label>
                <div class="key-row">
                    <input type="password" id="groqKeyInput" placeholder="Groq key (console.groq.com)">
                    <button class="key-save" id="groqSaveBtn">Save</button>
                </div>
            </div>

            <div class="api-key-box">
                <label>Twelve Data API Key <span class="key-status" id="twStatus">Not set</span></label>
                <div class="key-row">
                    <input type="password" id="twKeyInput" placeholder="Twelve Data key (twelvedata.com)">
                    <button class="key-save" id="twSaveBtn">Save</button>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Investment Horizon</label>
                    <select id="horizon">
                        <option value="short">Short Term (1-7 days)</option>
                        <option value="medium">Medium Term (1-3 months)</option>
                        <option value="long">Long Term (6+ months)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Risk Tolerance</label>
                    <select id="risk">
                        <option value="low">Low Risk</option>
                        <option value="medium" selected>Medium Risk</option>
                        <option value="high">High Risk</option>
                    </select>
                </div>
            </div>
            <button class="analyze-btn" id="analyzeBtn">Analyze THYAO</button>
        </div>

        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <span id="loadingText">Fetching data...</span>
        </div>

        <div class="error-msg" id="errorMsg" style="display:none;"></div>

        <div class="result-section" id="resultSection" style="display:none;">
            <div class="signal-header">
                <div class="signal-badge" id="signalBadge">HOLD</div>
                <div class="signal-info">
                    <div class="stock-name" id="stockName"></div>
                    <div class="stock-price" id="stockPrice"></div>
                </div>
                <div class="confidence">
                    <span class="conf-label">Confidence</span>
                    <span class="conf-value" id="confValue">0%</span>
                </div>
            </div>
            <div class="indicators-grid" id="indicatorsGrid"></div>
            <div class="analysis-tabs">
                <button class="tab active" data-tab="short" onclick="switchTab('short')">Short Term</button>
                <button class="tab" data-tab="medium" onclick="switchTab('medium')">Medium Term</button>
                <button class="tab" data-tab="long" onclick="switchTab('long')">Long Term</button>
            </div>
            <div class="analysis-content" id="analysisContent"></div>
            <div class="disclaimer">AI-generated analysis for educational purposes only. Not financial advice.</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
